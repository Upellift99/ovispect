<!DOCTYPE html>
<html lang="en" class="bg-neutral-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta name="robots" content="noindex, nofollow">
    <title>Access denied — {{ site_name }}</title>

    <link rel="stylesheet" href="/static/app.css">

    <style>
        html, body { background-color: #0a0a0a; }
        body {
            color: #e5e5e5;
            font-family: '"IBM Plex Mono"', ui-monospace, monospace;
            font-feature-settings: "tnum" 1, "calt" 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .accent-divider {
            height: 1px;
            background: linear-gradient(90deg, rgba(248, 113, 113, 0.4) 0%, rgba(248, 113, 113, 0.0) 70%);
        }
        .signout {
            background-color: rgba(82, 82, 82, 0.18);
            color: #d4d4d4;
            border: 1px solid #404040;
            transition: background-color 120ms ease-in-out, color 120ms ease-in-out;
        }
        .signout:hover {
            background-color: rgba(82, 82, 82, 0.32);
            color: #f5f5f5;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

<main class="w-full max-w-md">

    <div class="text-center mb-8">
        <h1 class="font-sans text-2xl font-semibold tracking-tight text-neutral-100">Access denied</h1>
        <p class="mt-1 text-xs uppercase tracking-[0.18em] text-neutral-600">{{ site_name }}</p>
        <div class="accent-divider mt-5 w-24 mx-auto"></div>
    </div>

    <section class="rounded border border-neutral-800 bg-neutral-950/50 p-6">
        <p class="text-sm text-neutral-400">
            Your account does not have access to this resource.
        </p>

        {% if required_groups %}
        <div class="mt-5 rounded border border-neutral-800 bg-neutral-900/40 p-4">
            <p class="text-[10px] uppercase tracking-[0.14em] text-neutral-500 mb-2">Required groups</p>
            <ul class="text-xs text-neutral-300 space-y-1">
                {% for group in required_groups %}
                <li class="font-mono">— {{ group }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}

        <form method="post" action="/logout" class="mt-6">
            <button type="submit" class="signout w-full rounded px-4 py-3 text-sm font-medium tracking-wide">
                Sign out
            </button>
        </form>
    </section>

    <footer class="mt-6 flex items-center justify-center text-[10px] uppercase tracking-[0.12em] text-neutral-700">
        <span>ovispect v{{ version }}</span>
    </footer>

</main>

</body>
</html>
