<!DOCTYPE html>
<html lang="en" class="bg-neutral-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta name="robots" content="noindex, nofollow">
    <title>Authentication failed — {{ site_name }}</title>

    <link rel="stylesheet" href="/static/app.css">

    <style>
        html, body { background-color: #0a0a0a; }
        body {
            color: #e5e5e5;
            font-family: '"IBM Plex Mono"', ui-monospace, monospace;
            font-feature-settings: "tnum" 1, "calt" 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .accent-divider {
            height: 1px;
            background: linear-gradient(90deg, rgba(251, 191, 36, 0.4) 0%, rgba(251, 191, 36, 0.0) 70%);
        }
        .retry {
            background-color: rgba(74, 222, 128, 0.12);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.4);
            transition: background-color 120ms ease-in-out, border-color 120ms ease-in-out, color 120ms ease-in-out;
            display: inline-block;
            text-align: center;
            text-decoration: none;
        }
        .retry:hover {
            background-color: rgba(74, 222, 128, 0.22);
            border-color: rgba(74, 222, 128, 0.6);
            color: #86efac;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

<main class="w-full max-w-md">

    <div class="text-center mb-8">
        <h1 class="font-sans text-2xl font-semibold tracking-tight text-neutral-100">Authentication failed</h1>
        <p class="mt-1 text-xs uppercase tracking-[0.18em] text-neutral-600">{{ site_name }}</p>
        <div class="accent-divider mt-5 w-24 mx-auto"></div>
    </div>

    <section class="rounded border border-neutral-800 bg-neutral-950/50 p-6">
        <p class="text-sm text-neutral-400">
            Something went wrong during sign-in. Please try again.
        </p>

        <a href="/login" class="retry mt-6 w-full rounded px-4 py-3 text-sm font-medium tracking-wide">
            Try again
        </a>
    </section>

    <footer class="mt-6 flex items-center justify-between gap-4 text-[10px] uppercase tracking-[0.12em] text-neutral-700">
        <span>ovispect v{{ version }}</span>
        <span class="font-mono">id {{ request_id }}</span>
    </footer>

</main>

</body>
</html>
