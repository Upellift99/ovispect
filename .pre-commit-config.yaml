repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        args: ["--strict"]
        additional_dependencies:
          - fastapi>=0.110
          - pydantic>=2.6
          - pydantic-settings>=2.2
          - jinja2>=3.1
          - uvicorn>=0.29
          - bcrypt>=4.1
          - itsdangerous>=2.2
          - python-multipart>=0.0.9
          - httpx>=0.27
          - authlib>=1.3
        files: ^src/ovispect/

  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.0-beta
    hooks:
      - id: hadolint-docker
        args: ["--ignore", "DL3008", "--ignore", "DL3018"]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: ^tests/fixtures/

  - repo: local
    hooks:
      - id: build-css
        name: rebuild Tailwind CSS
        # Triggered when any Tailwind source changes. The script downloads the
        # standalone Tailwind CLI on first run (~30 MB, cached under .cache/),
        # then recompiles src/ovispect/static/app.css. If the regenerated file
        # differs from what was staged, pre-commit aborts and lists app.css as
        # modified — `git add` it and re-commit.
        entry: scripts/build-css.sh
        language: script
        pass_filenames: false
        files: ^(src/ovispect/templates/.*\.html|src/ovispect/static/app\.src\.css|tailwind\.config\.js)$
