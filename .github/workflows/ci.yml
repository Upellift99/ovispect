name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install --upgrade pip && pip install ruff
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  types:
    name: Type-check (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - run: mypy --strict src/ovispect

  test:
    name: Test (pytest, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install project (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pytest
        run: pytest -v --cov=ovispect --cov-report=xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  dockerfile:
    name: Lint Dockerfile (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project (with dev + e2e extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,e2e]"
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pyproject.toml') }}
      - name: Install Chromium
        # `--with-deps` pulls the system libraries (libnss3, libatk, …) the
        # browser needs on a bare ubuntu-latest runner. We always run it: the
        # OS-level apt packages aren't covered by the cache above.
        run: playwright install --with-deps chromium
      - name: Run e2e suite
        run: pytest -m e2e -v

  build:
    name: Build container image (smoke)
    runs-on: ubuntu-latest
    needs: [lint, types, test, dockerfile, e2e]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ovispect:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
