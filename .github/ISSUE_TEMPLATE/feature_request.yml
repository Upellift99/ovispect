name: Feature request
description: Suggest a new capability or improvement.
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ovispect intentionally has a narrow scope. Please skim the
        *Why ovispect?* section of the README and the *Hors scope* notes in
        CONTRIBUTING before opening a feature request, so we can avoid
        re-litigating already-decided non-goals (GeoIP, persistence,
        in-app authentication, multi-server, …).
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-visible problem are you trying to solve? Who is affected?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you would like ovispect to do.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered (including doing nothing).
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, links to related issues or projects.
  - type: checkboxes
    id: terms
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I read the README's scope section and this request is in scope.
          required: true
