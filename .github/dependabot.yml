version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    groups:
      patch-updates:
        update-types:
          - patch
      minor-updates:
        update-types:
          - minor
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - python

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - docker

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - ci
