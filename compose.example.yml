# Standalone deployment with ovispect's built-in authentication.
#
# Generate AUTH_PASSWORD_HASH once with:
#     python -m ovispect.hash_password
# (or `htpasswd -nbB admin "yourpassword" | cut -d: -f2` if you have apache2-utils)
#
# Generate a session secret:
#     openssl rand -hex 32
#
# Then run with:
#     docker compose up -d
#
# Open http://localhost:8000 and sign in.
#
# Production: terminate TLS in front of ovispect (Caddy/Traefik/nginx) so
# that SESSION_COOKIE_SECURE=true is honoured by the browser.

services:
  ovispect:
    image: ghcr.io/Upellift99/ovispect:latest
    container_name: ovispect
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      OPENVPN_HOST: 10.0.0.5
      OPENVPN_PORT: "5555"
      # OPENVPN_PASSWORD: changeme
      SITE_NAME: My VPN
      REFRESH_SECONDS: "10"
      TIMEZONE: UTC
      LOG_LEVEL: INFO

      AUTH_USERNAME: admin
      AUTH_PASSWORD_HASH: ${AUTH_PASSWORD_HASH}    # bcrypt hash, see header
      SESSION_SECRET: ${SESSION_SECRET}            # `openssl rand -hex 32`
      SESSION_LIFETIME_SECONDS: "86400"
      SESSION_COOKIE_SECURE: "true"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
