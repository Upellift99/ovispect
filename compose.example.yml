# Standalone deployment with ovispect's built-in authentication.
#
# 1. Copy `.env.example` to `.env` and fill in:
#       AUTH_PASSWORD_HASH=$(python -m ovispect.hash_password)
#       SESSION_SECRET=$(openssl rand -hex 32)
#       OPENVPN_HOST=...
#       OPENVPN_PORT=...
#       AUTH_USERNAME=...   # optional, defaults to "admin"
#       (any other override you need)
#
# 2. Run:  docker compose up -d
#
# 3. Open http://localhost:8000 and sign in.
#
# Production: terminate TLS in front of ovispect (Caddy/Traefik/nginx) so
# SESSION_COOKIE_SECURE=true is honoured by the browser.

services:
  ovispect:
    image: ghcr.io/upellift99/ovispect:latest
    container_name: ovispect
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      OPENVPN_HOST: ${OPENVPN_HOST:?set OPENVPN_HOST in .env}
      OPENVPN_PORT: ${OPENVPN_PORT:?set OPENVPN_PORT in .env}
      OPENVPN_PASSWORD: ${OPENVPN_PASSWORD:-}
      SITE_NAME: ${SITE_NAME:-OpenVPN}
      REFRESH_SECONDS: ${REFRESH_SECONDS:-10}
      TIMEZONE: ${TIMEZONE:-UTC}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD_HASH: ${AUTH_PASSWORD_HASH:?set AUTH_PASSWORD_HASH in .env}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      SESSION_LIFETIME_SECONDS: ${SESSION_LIFETIME_SECONDS:-86400}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
